[VIRTUAL-SENSOR]
algo_type       virtual
sensors         mtktsAP         mtktsbtsmdpa
weight          2               1
polling         1000

[SS-CPU6]
algo_type       ss
sensor          VIRTUAL-SENSOR
device          cpu6
polling         500
trig            43000           45000           48000     55000
clr             42000           44000           47000     53000
target          1419000         1308000         1169000   835000

[MONITOR-BAT]
algo_type       monitor
sensor          VIRTUAL-SENSOR
device          battery
polling         1000
# 提高触发点，并收窄 clr 的差距 (回差只有 1°C)
trig            44000   46000   47000   48000   50000   52000      60000
clr             43000   45000   46000   47000   49000   51000      58000
# 大幅减小降流惩罚 (例如原先降806mA/1312mA，改小一些，让降流更平缓)
target          0       300     450     600     900     1200       1500